# Configuration Netlify pour CasiClicker PWA
# Le fichier doit rester à la racine du projet déployé.

[build]
  # Pas de build step — le jeu est du HTML statique
  publish = "."

# Ne déploie PAS ces dossiers (économie de bandwidth + confidentialité)
[build.processing]
  skip_processing = true

# Exclure les dossiers non-runtime via .netlifyignore (cf. fichier séparé)

# === Headers pour le Service Worker PWA ===
# Le SW doit être servi sans cache agressif pour que les maj arrivent
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Images base64 & autres assets : cache agressif
[[headers]]
  for = "/img_data.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions-Policy limite ce que le jeu peut faire (défense en profondeur)
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Redirect www → non-www (une seule URL canonique)
[[redirects]]
  from = "https://www.casiclicker.com/*"
  to = "https://casiclicker.com/:splat"
  status = 301
  force = true

# Fallback : si une route inconnue, servir index.html (SPA-style pour permettre le deep-linking futur)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
